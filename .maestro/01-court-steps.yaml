# CUF: move markers, bank steps with Next, undo/redo/clear.
# Moves stay PENDING until the amber Next (in Redo's slot) banks them: a drag
# alone must NOT advance the step counter. Swipe coordinates target the
# default doubles positions (top-left player 25%/30% of court, shuttle
# 54%/59%); the Step assertions fail if a drag misses.
appId: com.haritabhgupta.badmintoncourtsimulator
---
- launchApp:
    clearState: true
# fresh installs open on the first-run tour; the pill doubles as the
# settle-assert (the court re-seeds once the real layout is measured)
- assertVisible: "Skip tour"
- tapOn: "Skip tour"
- assertVisible: "Doubles.*Step 1"
- swipe:
    start: 30%, 35%
    end: 45%, 20%
    duration: 800
# the move is pending: counter unchanged, Redo slot armed as Next
- assertVisible: "Doubles.*Step 1"
- tapOn: "Next"
- assertVisible: "Doubles.*Step 2"
- swipe:
    start: 53%, 56%
    end: 70%, 45%
    duration: 800
- tapOn: "Next"
- assertVisible: "Doubles.*Step 3"
- tapOn: "Undo"
- assertVisible: "Doubles.*Step 2"
- tapOn: "Redo"
- assertVisible: "Doubles.*Step 3"
# with steps built the first dock slot is "Clear" (wipes the stack,
# keeps positions); it only reads "Reset" while the board is pristine
- tapOn: "Clear"
- assertVisible: "Doubles.*Step 1"
